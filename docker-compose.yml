services:
  postgres:
    image: postgres:17-alpine
    container_name: expense-db
    restart: unless-stopped
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DATABASE_USER:-expense_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-expense_pass}
      POSTGRES_DB: ${DATABASE_NAME:-expense_db}
    volumes:
      - pgdata:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:latest
    container_name: expense-localstack
    restart: unless-stopped
    ports:
      - '${S3_PORT:-4566}:4566'
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - ./docker/init-localstack.sh:/etc/localstack/init/ready.d/init-script.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  processing-service:
    build:
      context: ./processing-service
      dockerfile: Dockerfile
    container_name: expense-processing
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      S3_ENDPOINT: http://localstack:4566
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-expense-receipts}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-test}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-test}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.7}
      MAX_AI_RETRIES: ${MAX_AI_RETRIES:-3}
      BACKEND_URL: http://host.docker.internal:${PORT:-8080}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-key}
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
    name: expense-pgdata
